<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Form</title>
  </head>
  <body>

    <header>
      <h1>Register Form</h1>
    </header>

    <hr>

    <main>
      <form>

        <label for="name">Name</label><br>
        <input type="text" id="name" placeholder="Enter Your Name"><br><br>

        <label for="mobile">Mobile No.</label><br>
        <input type="number" id="mobile" placeholder="Enter Your Mobile Number"><br><br>

        <label for="email">Email</label><br>
        <input type="email" id="email" placeholder="Enter Your Email"><br><br>

        <label for="password">Password</label><br>
        <input type="password" id="password" placeholder="Enter Your Password"><br><br>

        <p>Select Your Exam</p>
        <label for="id1">
          <input type="radio" name="exam" value="JEE" id="id1"> JEE
        </label>
        <label for="id2">
          <input type="radio" name="exam" value="NEET" id="id2"> NEET
        </label><br><br>

        <label for="city">Select City</label><br>
        <select name="City" id="city">
          <option value="Pune">Pune</option>
          <option value="Delhi">Delhi</option>
          <option value="Mumbai">Mumbai</option>
          <option value="Agra">Agra</option>
          <option value="Banglore">Banglore</option>
        </select><br><br>

        <button type="submit">Submit</button>

      </form>
    </main>

    <hr>

    <footer>
      <button>Contact Us</button>
    </footer>

  </body>
</html>
